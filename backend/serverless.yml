org: rgzimring
app: gather
service: gather

plugins:
  - serverless-offline

custom:
  pgConnectionString:
    prod: ${env:PG_CONNECTION_STRING_PROD}
    dev: ${env:PG_CONNECTION_STRING_DEV}
provider:
  name: aws
  runtime: nodejs24.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: 7
  versionFunctions: false
  environment:
    STAGE: ${self:provider.stage}
    SERVICE: ${self:service}
    REGION: ${self:provider.region}
    APPLE_BUNDLE_ID: com.richardzimring.gather
    PG_CONNECTION_STRING: ${self:custom.pgConnectionString.${self:provider.stage}}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_SECRET: ${env:GOOGLE_CLIENT_SECRET}
    GOOGLE_REDIRECT_URI: ${env:GOOGLE_REDIRECT_URI}
    OUTLOOK_CLIENT_ID: ${env:OUTLOOK_CLIENT_ID}
    OUTLOOK_CLIENT_SECRET: ${env:OUTLOOK_CLIENT_SECRET}
    OUTLOOK_REDIRECT_URI: ${env:OUTLOOK_REDIRECT_URI}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS

functions:
  # ============================================
  # API (Monolambda)
  # ============================================
  Api:
    handler: lambdas/api.handler
    name: ${self:provider.stage}-${self:service}-api
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: '*'
          method: '*'

  # ============================================
  # Calendar Sync (Scheduled)
  # ============================================
  CalendarSync:
    handler: lambdas/calendar-sync.handler
    name: ${self:provider.stage}-${self:service}-calendar-sync
    memorySize: 256
    timeout: 120
    events:
      - schedule:
          rate: rate(15 minutes)
          enabled: true
