org: rgzimring
app: gather
service: gather

plugins:
  - serverless-offline

custom:
  appBundleIdentifier:
    prod: com.gather.app
    dev: host.exp.Exponent
provider:
  name: aws
  runtime: nodejs24.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: 7
  versionFunctions: false
  environment:
    STAGE: ${self:provider.stage}
    SERVICE: ${self:service}
    REGION: ${self:provider.region}
    MAIN_TABLE_NAME: !Ref MainTable
    APPLE_BUNDLE_ID: ${self:custom.appBundleIdentifier.${self:provider.stage}}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS

functions:
  # ============================================
  # Auth Function
  # ============================================
  Auth:
    handler: lambdas/auth.handler
    name: ${self:provider.stage}-${self:service}-auth
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /auth/apple/callback
          method: POST
      - httpApi:
          path: /auth/me
          method: GET
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:Query
          - dynamodb:BatchWriteItem
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

  # ============================================
  # Users Function
  # ============================================
  Users:
    handler: lambdas/users.handler
    name: ${self:provider.stage}-${self:service}-users
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /users/me
          method: GET
      - httpApi:
          path: /users/me
          method: PATCH
      - httpApi:
          path: /users/me
          method: DELETE
      - httpApi:
          path: /users/me/push-token
          method: POST
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:BatchWriteItem
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

  # ============================================
  # Friends Function
  # ============================================
  Friends:
    handler: lambdas/friends.handler
    name: ${self:provider.stage}-${self:service}-friends
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /friends
          method: GET
      - httpApi:
          path: /friends/search
          method: GET
      - httpApi:
          path: /friends/invite-code
          method: GET
      - httpApi:
          path: /friends/invite-code/regenerate
          method: POST
      - httpApi:
          path: /friends/request
          method: POST
      - httpApi:
          path: /friends/{friendId}/accept
          method: POST
      - httpApi:
          path: /friends/{friendId}/decline
          method: POST
      - httpApi:
          path: /friends/{friendId}/block
          method: POST
      - httpApi:
          path: /friends/{friendId}
          method: DELETE
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:BatchWriteItem
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

  # ============================================
  # Groups Function
  # ============================================
  Groups:
    handler: lambdas/groups.handler
    name: ${self:provider.stage}-${self:service}-groups
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /groups
          method: GET
      - httpApi:
          path: /groups
          method: POST
      - httpApi:
          path: /groups/{groupId}
          method: PATCH
      - httpApi:
          path: /groups/{groupId}
          method: DELETE
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

  # ============================================
  # Activities Function
  # ============================================
  Activities:
    handler: lambdas/activities.handler
    name: ${self:provider.stage}-${self:service}-activities
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /activities
          method: GET
      - httpApi:
          path: /activities
          method: POST
      - httpApi:
          path: /activities/{activityId}
          method: PATCH
      - httpApi:
          path: /activities/{activityId}
          method: DELETE
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

  # ============================================
  # Availability Function
  # ============================================
  Availability:
    handler: lambdas/availability.handler
    name: ${self:provider.stage}-${self:service}-availability
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /availability
          method: GET
      - httpApi:
          path: /availability
          method: POST
      - httpApi:
          path: /availability/{windowId}
          method: PATCH
      - httpApi:
          path: /availability/{windowId}
          method: DELETE
      - httpApi:
          path: /availability/friends
          method: GET
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:BatchGetItem
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

  # ============================================
  # Events Function
  # ============================================
  Events:
    handler: lambdas/events.handler
    name: ${self:provider.stage}-${self:service}-events
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /events
          method: GET
      - httpApi:
          path: /events
          method: POST
      - httpApi:
          path: /events/{eventId}
          method: GET
      - httpApi:
          path: /events/{eventId}
          method: PATCH
      - httpApi:
          path: /events/{eventId}
          method: DELETE
      - httpApi:
          path: /events/{eventId}/respond
          method: POST
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:BatchWriteItem
        Resource:
          - !GetAtt MainTable.Arn
          - !Sub '${MainTable.Arn}/index/*'

resources:
  Resources:
    # ============================================
    # DynamoDB Table
    # ============================================
    MainTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-main
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: gsi1pk
            AttributeType: S
          - AttributeName: gsi1sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: gsi1
            KeySchema:
              - AttributeName: gsi1pk
                KeyType: HASH
              - AttributeName: gsi1sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

  Outputs:
    MainTableName:
      Description: Main DynamoDB table name
      Value: !Ref MainTable
    MainTableArn:
      Description: Main DynamoDB table ARN
      Value: !GetAtt MainTable.Arn
