org: rgzimring
app: gather
service: gather

plugins:
  - serverless-offline

custom:
  appBundleIdentifier:
    prod: com.gather.app
    dev: host.exp.Exponent
  pgConnectionString:
    prod: ${env:PG_CONNECTION_STRING_PROD}
    dev: ${env:PG_CONNECTION_STRING_DEV}
provider:
  name: aws
  runtime: nodejs24.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: 7
  versionFunctions: false
  environment:
    STAGE: ${self:provider.stage}
    SERVICE: ${self:service}
    REGION: ${self:provider.region}
    APPLE_BUNDLE_ID: ${self:custom.appBundleIdentifier.${self:provider.stage}}
    PG_CONNECTION_STRING: ${self:custom.pgConnectionString.${self:provider.stage}}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS

functions:
  # ============================================
  # Auth Function
  # ============================================
  Auth:
    handler: lambdas/auth.handler
    name: ${self:provider.stage}-${self:service}-auth
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /auth/apple/callback
          method: POST
      - httpApi:
          path: /auth/me
          method: GET

  # ============================================
  # Users Function
  # ============================================
  Users:
    handler: lambdas/users.handler
    name: ${self:provider.stage}-${self:service}-users
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /users/me
          method: GET
      - httpApi:
          path: /users/me
          method: PATCH
      - httpApi:
          path: /users/me
          method: DELETE
      - httpApi:
          path: /users/me/push-token
          method: POST

  # ============================================
  # Friends Function
  # ============================================
  Friends:
    handler: lambdas/friends.handler
    name: ${self:provider.stage}-${self:service}-friends
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /friends
          method: GET
      - httpApi:
          path: /friends/search
          method: GET
      - httpApi:
          path: /friends/invite-code
          method: GET
      - httpApi:
          path: /friends/invite-code/regenerate
          method: POST
      - httpApi:
          path: /friends/request
          method: POST
      - httpApi:
          path: /friends/{friendId}/accept
          method: POST
      - httpApi:
          path: /friends/{friendId}/decline
          method: POST
      - httpApi:
          path: /friends/{friendId}/block
          method: POST
      - httpApi:
          path: /friends/{friendId}
          method: DELETE

  # ============================================
  # Groups Function
  # ============================================
  Groups:
    handler: lambdas/groups.handler
    name: ${self:provider.stage}-${self:service}-groups
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /groups
          method: GET
      - httpApi:
          path: /groups
          method: POST
      - httpApi:
          path: /groups/{groupId}
          method: PATCH
      - httpApi:
          path: /groups/{groupId}
          method: DELETE

  # ============================================
  # Activities Function
  # ============================================
  Activities:
    handler: lambdas/activities.handler
    name: ${self:provider.stage}-${self:service}-activities
    memorySize: 128
    timeout: 10
    events:
      - httpApi:
          path: /activities
          method: GET
      - httpApi:
          path: /activities
          method: POST
      - httpApi:
          path: /activities/{activityId}
          method: PATCH
      - httpApi:
          path: /activities/{activityId}
          method: DELETE

  # ============================================
  # Blocked Windows Function
  # ============================================
  Blocked:
    handler: lambdas/blocked.handler
    name: ${self:provider.stage}-${self:service}-blocked
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /blocked
          method: GET
      - httpApi:
          path: /blocked
          method: POST
      - httpApi:
          path: /blocked/{windowId}
          method: PATCH
      - httpApi:
          path: /blocked/{windowId}
          method: DELETE
      - httpApi:
          path: /blocked/friends-free-time
          method: GET

  # ============================================
  # Events Function
  # ============================================
  Events:
    handler: lambdas/events.handler
    name: ${self:provider.stage}-${self:service}-events
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /events
          method: GET
      - httpApi:
          path: /events
          method: POST
      - httpApi:
          path: /events/{eventId}
          method: GET
      - httpApi:
          path: /events/{eventId}
          method: PATCH
      - httpApi:
          path: /events/{eventId}
          method: DELETE
      - httpApi:
          path: /events/{eventId}/respond
          method: POST

  # ============================================
  # Calendars Function
  # ============================================
  Calendars:
    handler: lambdas/calendars.handler
    name: ${self:provider.stage}-${self:service}-calendars
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /calendars
          method: GET
      - httpApi:
          path: /calendars
          method: POST
      - httpApi:
          path: /calendars/sync
          method: POST
      - httpApi:
          path: /calendars/busy-slots
          method: GET
      - httpApi:
          path: /calendars/{connectionId}
          method: GET
      - httpApi:
          path: /calendars/{connectionId}
          method: PATCH
      - httpApi:
          path: /calendars/{connectionId}
          method: DELETE
