<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-dark-32.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-dark-16.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>You're invited on Gather</title>
    <meta
      name="description"
      content="Someone invited you to an event. Get Gather to see the details and RSVP."
    />
    <meta name="theme-color" content="#0c0a09" />

    <!-- Open Graph / iMessage / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gather" />
    <meta property="og:url" content="https://gather.rzimring.com/e" />
    <meta property="og:title" content="You're invited on Gather" />
    <meta
      property="og:description"
      content="Someone invited you to an event. Get Gather to see the details and RSVP."
    />
    <meta
      property="og:image"
      content="https://gather.rzimring.com/og-default.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Gather — See the people you love." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="You're invited on Gather" />
    <meta
      name="twitter:description"
      content="Someone invited you to an event. Get Gather to see the details and RSVP."
    />
    <meta
      name="twitter:image"
      content="https://gather.rzimring.com/og-default.png"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f0ece6;
        --bg-card: #ffffff;
        --text: #1c1917;
        --text-muted: #78716c;
        --border-subtle: #e6e1db;
        --accent: #a855f7;
        --accent-subtle: rgba(168, 85, 247, 0.12);
        --accent-text: #9333ea;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0a09;
          --bg-card: #1c1917;
          --text: #fafaf9;
          --text-muted: #a8a29e;
          --border-subtle: #292524;
          --accent: #c084fc;
          --accent-subtle: rgba(192, 132, 252, 0.12);
          --accent-text: #c084fc;
        }
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        padding: 40px 28px;
        max-width: 380px;
        width: 100%;
        text-align: center;
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin: 0 auto 20px;
        display: block;
      }
      .badge {
        display: inline-block;
        background: var(--accent-subtle);
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        color: var(--accent-text);
        padding: 4px 10px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 10px;
      }
      p {
        font-size: 15px;
        color: var(--text-muted);
        margin-bottom: 24px;
      }
      .btn {
        display: block;
        background: var(--text);
        color: var(--bg);
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        padding: 14px 20px;
        border-radius: 10px;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 16px;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/icon-dark.png" alt="Gather" />
      <div class="badge">Event invite</div>
      <h1>You're invited on Gather</h1>
      <p>
        Someone invited you to an event. Get the app to see the details and let
        them know if you can make it.
      </p>
      <a
        class="btn"
        href="https://apps.apple.com/us/app/gather-plan-with-friends/id6759443297"
        >Get Gather on the App Store</a
      >
      <p class="hint">
        Already have the app? Open this link on your iPhone to jump straight to
        the event.
      </p>
    </div>
  </body>
</html>
